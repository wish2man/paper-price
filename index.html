<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単価かんたん比較</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #0f0f11;
  --surface1: #1a1a1f;
  --surface2: #222228;
  --surface3: #2a2a32;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --text-primary: #f0eff4;
  --text-secondary: #9996a8;
  --text-muted: #5e5c6e;
  --radius: 8px;
  --font: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text-primary); font-family: var(--font); font-size: 14px; }

.app { display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background: var(--surface1); border-bottom: 1px solid var(--border); padding: 14px 16px 0; position: sticky; top: 0; z-index: 10; }
.topbar-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.app-title { font-size: 17px; font-weight: 500; }
.tabs { display: flex; overflow-x: auto; gap: 0; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 14px; background: none; border: none; border-bottom: 2.5px solid transparent; cursor: pointer; font-family: var(--font); white-space: nowrap; transition: border-color 0.15s; min-width: 64px; }
.tab .tab-icon { font-size: 18px; }
.tab .tab-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
.tab.active .tab-label { color: var(--tc); }
.tab.active { border-bottom-color: var(--tc); }
.tab .tab-count { font-size: 10px; padding: 1px 7px; border-radius: 99px; background: var(--surface3); color: var(--text-muted); }
.tab.active .tab-count { background: var(--tbg); color: var(--tt); }

.body { padding: 16px; max-width: 680px; width: 100%; margin: 0 auto; }

.stats { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 18px; }
.stat-card { background: var(--surface1); border-radius: var(--radius); padding: 12px 14px; }
.stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 500; }
.stat-unit { font-size: 11px; color: var(--text-secondary); margin-left: 2px; }

.sort-bar { display: flex; align-items: center; gap: 8px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; margin-bottom: 14px; }
.sort-bar::-webkit-scrollbar { display: none; }
.sort-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
.sort-btn { white-space: nowrap; padding: 5px 12px; font-size: 12px; border-radius: 99px; cursor: pointer; font-family: var(--font); background: var(--surface2); color: var(--text-secondary); border: 1px solid var(--border); transition: all 0.15s; }
.sort-btn.active { background: var(--tbg); color: var(--tt); border-color: var(--tbd); font-weight: 500; }

.add-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--tc); color: #fff; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font); transition: opacity 0.15s; flex-shrink: 0; }
.add-btn:hover { opacity: 0.85; }

.items { display: flex; flex-direction: column; gap: 8px; }
.item-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; position: relative; overflow: hidden; }
.item-card.best { border-color: var(--tc); border-width: 1.5px; }
.best-badge { position: absolute; top: 0; right: 0; background: var(--tc); color: #fff; font-size: 10px; font-weight: 500; padding: 3px 10px; border-bottom-left-radius: var(--radius); }
.item-inner { display: flex; align-items: flex-start; gap: 12px; }
.rank-num { width: 32px; height: 32px; border-radius: 8px; background: var(--tbg); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: var(--tc); flex-shrink: 0; }
.item-body { flex: 1; min-width: 0; }
.item-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
.item-name { font-size: 14px; font-weight: 500; }
.store-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--surface3); color: var(--text-secondary); display: flex; align-items: center; gap: 3px; }
.pricey-badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; background: rgba(226,75,74,0.15); color: #f09595; }
.item-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; line-height: 1.6; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-track { height: 5px; background: var(--surface3); border-radius: 99px; overflow: hidden; flex: 1; }
.bar-fill { height: 100%; border-radius: 99px; background: var(--tc); transition: width 0.4s ease; }
.unit-price { font-size: 16px; font-weight: 500; white-space: nowrap; min-width: 90px; text-align: right; }
.unit-price.best { color: var(--tc); }
.unit-label { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: 2px; }
.item-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.icon-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; cursor: pointer; color: var(--text-secondary); font-size: 14px; transition: border-color 0.15s, color 0.15s; line-height: 1; }
.icon-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
.icon-btn.danger { color: #f09595; border-color: rgba(226,75,74,0.3); }
.icon-btn.danger:hover { border-color: #f09595; }

.empty { text-align: center; padding: 60px 24px; }
.empty-icon { font-size: 36px; margin-bottom: 14px; color: var(--text-muted); }
.empty-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
.empty-body { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
.empty-cta { display: inline-flex; align-items: center; gap: 6px; padding: 10px 24px; background: var(--tc); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font); }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 100; align-items: flex-start; justify-content: center; padding: 20px 16px; overflow-y: auto; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface2); border-radius: 16px; border: 1px solid var(--border-strong); width: 100%; max-width: 460px; overflow: hidden; margin: auto; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 500; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; line-height: 1; padding: 4px; }
.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; color: var(--text-muted); }
.field input, .field select {
  background: var(--surface3); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 12px; color: var(--text-primary); font-family: var(--font); font-size: 13px;
  outline: none; transition: border-color 0.15s; width: 100%;
  color-scheme: dark;
}
.field input:focus, .field select:focus { border-color: var(--tc); }
.field input::placeholder { color: var(--text-muted); }
.field input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
.calc-preview { border-radius: var(--radius); padding: 12px 16px; display: flex; align-items: baseline; gap: 8px; border: 1px solid var(--tbd); background: var(--tbg); }
.calc-label { font-size: 13px; color: var(--tt); }
.calc-value { font-size: 22px; font-weight: 500; color: var(--tc); }
.calc-unit { font-size: 13px; color: var(--tt); }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
.btn-cancel { background: none; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 9px 20px; font-size: 13px; color: var(--text-secondary); cursor: pointer; font-family: var(--font); }
.btn-save { border: none; border-radius: var(--radius); padding: 9px 24px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font); background: var(--tc); color: #fff; transition: opacity 0.15s; }
.btn-save:disabled { opacity: 0.3; cursor: not-allowed; }

.confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.confirm-overlay.open { display: flex; }
.confirm-box { background: var(--surface2); border-radius: 14px; border: 1px solid var(--border-strong); width: 100%; max-width: 320px; padding: 24px 20px 20px; text-align: center; }
.confirm-icon { font-size: 28px; color: #f09595; margin-bottom: 12px; }
.confirm-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
.confirm-body { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
.confirm-actions { display: flex; gap: 10px; }
.confirm-cancel { flex: 1; background: none; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 9px; font-size: 13px; color: var(--text-secondary); cursor: pointer; font-family: var(--font); }
.confirm-delete { flex: 1; background: rgba(226,75,74,0.8); border: none; border-radius: var(--radius); padding: 9px; font-size: 13px; font-weight: 500; color: #fff; cursor: pointer; font-family: var(--font); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar" id="topbar">
    <div class="topbar-row">
      <span class="app-title">単価かんたん比較</span>
      <button class="add-btn" id="addBtn" onclick="openAdd()">
        <i class="ti ti-plus" aria-hidden="true"></i>追加
      </button>
    </div>
    <div class="tabs" id="tabsEl"></div>
  </div>
  <div class="body" id="mainBody"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">商品を追加</span>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field">
          <label>商品名 *</label>
          <input id="fName" type="text" placeholder="例：エリエール 200組">
        </div>
        <div class="field">
          <label>店舗名</label>
          <input id="fStore" type="text" placeholder="例：イオン">
        </div>
      </div>
      <div class="field">
        <label>購入価格（円）*</label>
        <input id="fPrice" type="number" min="0" placeholder="例：398">
      </div>
      <div id="qtyFields"></div>
      <div class="field">
        <label>購入日時</label>
        <input id="fDatetime" type="datetime-local">
      </div>
      <div class="field">
        <label>メモ（任意）</label>
        <input id="fNote" type="text" placeholder="例：セール品">
      </div>
      <div class="calc-preview" id="calcPreview" style="display:none">
        <span class="calc-label">計算結果：</span>
        <span class="calc-value" id="calcValue"></span>
        <span class="calc-unit" id="calcUnit"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" id="btnSave" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon"><i class="ti ti-trash" aria-hidden="true"></i></div>
    <div class="confirm-title">この商品を削除しますか？</div>
    <div class="confirm-body" id="confirmBody"></div>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeConfirm()">キャンセル</button>
      <button class="confirm-delete" id="confirmDeleteBtn">削除する</button>
    </div>
  </div>
</div>

<script>
const CATS = [
  { id:'tissue',  label:'ティッシュ',       icon:'ti-box',       priceUnit:'円/組',  unitLabel:'組',  unitHelp:'1箱の組数（例：200）', type:'simple',
    color:'#5b9cf6', bg:'rgba(91,156,246,0.12)', border:'rgba(91,156,246,0.3)', text:'#8eb8fa' },
  { id:'toilet',  label:'トイレット',        icon:'ti-roll',      priceUnit:'円/m',   unitLabel:'m',   unitHelp:'', type:'rolls',
    color:'#2dd4a0', bg:'rgba(45,212,160,0.12)', border:'rgba(45,212,160,0.3)', text:'#6ee7c4' },
  { id:'kitchen', label:'キッチン',          icon:'ti-flames',    priceUnit:'円/枚',  unitLabel:'枚',  unitHelp:'1ロールの枚数（例：50）', type:'simple',
    color:'#f07a52', bg:'rgba(240,122,82,0.12)', border:'rgba(240,122,82,0.3)', text:'#f5a382' },
  { id:'rice',    label:'米',                icon:'ti-grain',     priceUnit:'円/kg',  unitLabel:'kg',  unitHelp:'内容量（kg、例：5）', type:'simple',
    color:'#e6b84a', bg:'rgba(230,184,74,0.12)', border:'rgba(230,184,74,0.3)', text:'#f0d080' },
  { id:'other',   label:'その他',            icon:'ti-package',   priceUnit:'円/個',  unitLabel:'個',  unitHelp:'内容数（枚・個など）', type:'simple',
    color:'#a89fc8', bg:'rgba(168,159,200,0.12)', border:'rgba(168,159,200,0.3)', text:'#c4bedd' },
];

const STORAGE_KEY = 'paper_price_v3';
let db = {};
try { db = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}
function persist() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e) {} }

let activeCat = CATS[0].id;
let sortBy = 'unitPrice';
let editId = null;
let deleteTarget = null;

function cat() { return CATS.find(c => c.id === activeCat); }
function items() { return db[activeCat] || []; }

function applyTheme(c) {
  const r = document.documentElement.style;
  r.setProperty('--tc', c.color);
  r.setProperty('--tbg', c.bg);
  r.setProperty('--tbd', c.border);
  r.setProperty('--tt', c.text);
}

function calcUnit(c, price, qty, rolls, meters) {
  const p = parseFloat(price);
  if (!p || p <= 0) return null;
  if (c.type === 'rolls') {
    const r = parseFloat(rolls), m = parseFloat(meters);
    if (!r || !m || r <= 0 || m <= 0) return null;
    return p / (r * m);
  }
  const q = parseFloat(qty);
  if (!q || q <= 0) return null;
  return p / q;
}

function nowLocal() {
  const d = new Date();
  d.setSeconds(0, 0);
  return d.toISOString().slice(0, 16);
}

function fmtDatetime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  } catch(e) { return iso; }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTabs() {
  document.getElementById('tabsEl').innerHTML = CATS.map(c => {
    const count = (db[c.id] || []).length;
    const active = c.id === activeCat ? 'active' : '';
    return `<button class="tab ${active}" style="--tc:${c.color};--tbg:${c.bg};--tt:${c.text}" onclick="switchTab('${c.id}')">
      <i class="ti ${c.icon} tab-icon" aria-hidden="true"></i>
      <span class="tab-label">${c.label}</span>
      ${count > 0 ? `<span class="tab-count">${count}件</span>` : ''}
    </button>`;
  }).join('');
}

function renderMain() {
  const c = cat();
  applyTheme(c);
  const sorted = [...items()].sort((a,b) => {
    if (sortBy==='unitPrice') return (a.unitPrice||0)-(b.unitPrice||0);
    if (sortBy==='price') return parseFloat(a.price||0)-parseFloat(b.price||0);
    if (sortBy==='name') return (a.name||'').localeCompare(b.name||'','ja');
    if (sortBy==='store') return (a.store||'').localeCompare(b.store||'','ja');
    if (sortBy==='datetime') return new Date(b.datetime||b.addedAt||0)-new Date(a.datetime||a.addedAt||0);
    return 0;
  });
  const n = sorted.length;
  const maxU = n > 0 ? Math.max(...sorted.map(i=>i.unitPrice||0)) : 0;
  const minU = n > 0 ? Math.min(...sorted.map(i=>i.unitPrice||0)) : 0;
  const bestId = sorted[0]?.id;
  const priceyId = sorted[n-1]?.id;

  let html = '';

  if (n > 0) {
    const ratio = minU > 0 ? (maxU/minU).toFixed(1) : '—';
    html += `<div class="stats">
      <div class="stat-card"><div class="stat-label">最安単価</div><div class="stat-value">${minU.toFixed(2)}<span class="stat-unit">${c.priceUnit}</span></div></div>
      <div class="stat-card"><div class="stat-label">登録数</div><div class="stat-value">${n}<span class="stat-unit">件</span></div></div>
      <div class="stat-card"><div class="stat-label">最高 / 最安</div><div class="stat-value">${ratio}<span class="stat-unit">倍</span></div></div>
    </div>`;

    const sorts = [
      {key:'unitPrice', label:'単価が安い順'},
      {key:'price',     label:'価格順'},
      {key:'name',      label:'商品名順'},
      {key:'store',     label:'店舗順'},
      {key:'datetime',  label:'購入日が新しい順'},
    ];
    html += `<div class="sort-bar"><span class="sort-label">並び替え：</span>`;
    sorts.forEach(s => {
      html += `<button class="sort-btn ${sortBy===s.key?'active':''}" onclick="setSort('${s.key}')">${s.label}</button>`;
    });
    html += `</div><div class="items">`;

    sorted.forEach((item, idx) => {
      const isBest = item.id===bestId && n>1;
      const isPricey = item.id===priceyId && n>2;
      const barW = maxU>0 ? Math.round(((maxU-(item.unitPrice||0)+minU)/maxU)*100) : 0;
      const meta = c.type==='rolls'
        ? `${parseFloat(item.price).toLocaleString()}円 ／ ${item.rolls}ロール × ${item.meters}m`
        : `${parseFloat(item.price).toLocaleString()}円 ／ ${item.qty}${c.unitLabel}`;
      const dtStr = item.datetime ? fmtDatetime(item.datetime) : '';

      html += `<div class="item-card ${isBest?'best':''}">
        ${isBest ? '<div class="best-badge">最安値</div>' : ''}
        <div class="item-inner">
          <div class="rank-num">${idx+1}</div>
          <div class="item-body">
            <div class="item-name-row">
              <span class="item-name">${esc(item.name)}</span>
              ${item.store ? `<span class="store-badge"><i class="ti ti-building-store" style="font-size:11px" aria-hidden="true"></i>${esc(item.store)}</span>` : ''}
              ${isPricey ? '<span class="pricey-badge">割高</span>' : ''}
            </div>
            <div class="item-meta">
              ${meta}${item.note ? ' • '+esc(item.note) : ''}
              ${dtStr ? `<br><i class="ti ti-clock" style="font-size:11px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>${dtStr}` : ''}
            </div>
            <div class="bar-row">
              <div class="bar-track"><div class="bar-fill" style="width:${barW}%"></div></div>
              <span class="unit-price ${isBest?'best':''}">${(item.unitPrice||0).toFixed(2)}<span class="unit-label">${c.priceUnit}</span></span>
            </div>
          </div>
          <div class="item-actions">
            <button class="icon-btn" aria-label="編集" onclick="openEdit('${item.id}')"><i class="ti ti-edit"></i></button>
            <button class="icon-btn danger" aria-label="削除" onclick="confirmDelete('${item.id}')"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="empty">
      <div class="empty-icon"><i class="ti ti-clipboard-list" aria-hidden="true"></i></div>
      <div class="empty-title">${c.label}の記録がありません</div>
      <div class="empty-body">商品を追加して単価を比較しましょう。</div>
      <button class="empty-cta" onclick="openAdd()"><i class="ti ti-plus" aria-hidden="true"></i> 最初の商品を追加</button>
    </div>`;
  }

  document.getElementById('mainBody').innerHTML = html;
}

function render() { renderTabs(); renderMain(); }
function switchTab(id) { activeCat = id; sortBy = 'unitPrice'; render(); }
function setSort(s) { sortBy = s; renderMain(); }

function updateQtyFields() {
  const c = cat();
  const el = document.getElementById('qtyFields');
  if (c.type==='rolls') {
    el.innerHTML = `<div class="field-row">
      <div class="field"><label>ロール数 *</label><input id="fRolls" type="number" min="0" placeholder="例：12"></div>
      <div class="field"><label>1本の長さ（m）*</label><input id="fMeters" type="number" min="0" placeholder="例：25"></div>
    </div>`;
    document.getElementById('fRolls').addEventListener('input', updateCalc);
    document.getElementById('fMeters').addEventListener('input', updateCalc);
  } else {
    el.innerHTML = `<div class="field"><label>${c.unitHelp} *</label><input id="fQty" type="number" min="0" placeholder="例：200"></div>`;
    document.getElementById('fQty').addEventListener('input', updateCalc);
  }
}

function openAdd() {
  editId = null;
  document.getElementById('modalTitle').textContent = `商品を追加 — ${cat().label}`;
  document.getElementById('fName').value = '';
  document.getElementById('fStore').value = '';
  document.getElementById('fPrice').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('fDatetime').value = nowLocal();
  updateQtyFields();
  document.getElementById('calcPreview').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 50);
}

function openEdit(id) {
  const item = (db[activeCat]||[]).find(i=>i.id===id);
  if (!item) return;
  editId = id;
  document.getElementById('modalTitle').textContent = `商品を編集 — ${cat().label}`;
  document.getElementById('fName').value = item.name||'';
  document.getElementById('fStore').value = item.store||'';
  document.getElementById('fPrice').value = item.price||'';
  document.getElementById('fNote').value = item.note||'';
  document.getElementById('fDatetime').value = item.datetime || item.addedAt?.slice(0,16) || nowLocal();
  updateQtyFields();
  const c = cat();
  if (c.type==='rolls') {
    document.getElementById('fRolls').value = item.rolls||'';
    document.getElementById('fMeters').value = item.meters||'';
  } else {
    document.getElementById('fQty').value = item.qty||'';
  }
  updateCalc();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editId = null;
}

function updateCalc() {
  const c = cat();
  const price = document.getElementById('fPrice').value;
  let u;
  if (c.type==='rolls') {
    u = calcUnit(c, price, null, document.getElementById('fRolls')?.value, document.getElementById('fMeters')?.value);
  } else {
    u = calcUnit(c, price, document.getElementById('fQty')?.value, null, null);
  }
  const prev = document.getElementById('calcPreview');
  if (u !== null) {
    document.getElementById('calcValue').textContent = u.toFixed(2);
    document.getElementById('calcUnit').textContent = c.priceUnit;
    prev.style.display = 'flex';
  } else {
    prev.style.display = 'none';
  }
}

function saveItem() {
  const c = cat();
  const name = document.getElementById('fName').value.trim();
  const store = document.getElementById('fStore').value.trim();
  const price = document.getElementById('fPrice').value;
  const note = document.getElementById('fNote').value.trim();
  const datetime = document.getElementById('fDatetime').value;
  let qty='', rolls='', meters='', u;
  if (c.type==='rolls') {
    rolls = document.getElementById('fRolls')?.value||'';
    meters = document.getElementById('fMeters')?.value||'';
    u = calcUnit(c, price, null, rolls, meters);
  } else {
    qty = document.getElementById('fQty')?.value||'';
    u = calcUnit(c, price, qty, null, null);
  }
  if (!name || !price || u===null) return;

  if (!db[activeCat]) db[activeCat] = [];
  if (editId) {
    db[activeCat] = db[activeCat].map(i => i.id===editId ? {...i,name,store,price,qty,rolls,meters,note,datetime,unitPrice:u} : i);
  } else {
    db[activeCat].push({id:Date.now().toString(),name,store,price,qty,rolls,meters,note,datetime,unitPrice:u,addedAt:new Date().toISOString()});
  }
  persist();
  closeModal();
  render();
}

function confirmDelete(id) {
  const item = (db[activeCat]||[]).find(i=>i.id===id);
  if (!item) return;
  deleteTarget = id;
  document.getElementById('confirmBody').textContent = `「${item.name}」を削除します。この操作は取り消せません。`;
  document.getElementById('confirmDeleteBtn').onclick = () => { doDelete(); };
  document.getElementById('confirmOverlay').classList.add('open');
}

function doDelete() {
  if (!deleteTarget) return;
  db[activeCat] = (db[activeCat]||[]).filter(i=>i.id!==deleteTarget);
  persist();
  closeConfirm();
  render();
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  deleteTarget = null;
}

document.getElementById('fPrice').addEventListener('input', updateCalc);
document.getElementById('modalOverlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
document.getElementById('confirmOverlay').addEventListener('click', function(e) { if(e.target===this) closeConfirm(); });

applyTheme(CATS[0]);
render();
</script>
</body>
</html>
